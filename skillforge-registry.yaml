# SkillForge Skill Registry
#
# 【v0.2.6 起：涌现式生长】
# 此 Registry 默认为空。skill 不由设计阶段预设，
# 而是由 Agent 在真实工作中发现 —— Phase 4 检测到某 task_type
# 累计 count ≥ 5 时，Forger 自动生成 SKILL.md 轻量骨架草稿
# 至 memory/self-made/，供用户审核后 `sf push` 入库。
#
# capability_gains 维度说明（v0.2 统一 3 维）：
#   precision:      数据准确性提升（幻觉风险高的任务此项更重要）
#   reasoning:      复杂逻辑推理能力提升
#   tool_knowledge: 工具调用和细分领域知识提升
#
# 数值语义：
#   - 当前值为**设计意图估算**（非真实验证数据）
#   - 每个条目标注「预估」，由 Phase 4 真实反馈逐步校准
#   - 当某 skill 累计 usage_count ≥ 10 时，应转为「已校准」状态
#
# quality_tier 语义：
#   L1:      经大规模真实数据验证（usage ≥ 50 且 avg_delta ≥ +5）
#   L2:      设计意图估算（默认状态，待验证）
#   L3:      实验性 / 未经验证
#   unknown: 无数据基础，暂不建议用于 Phase 2 推荐
#
# 添加新 skill 的路径（推荐）：
#   1. 让系统自然运行，Forger 在同类任务 ≥5 次后生成草稿
#   2. 审核 memory/self-made/<task_type>-draft-*.md
#   3. 完善内容后运行 `sf push memory/self-made/xxx-draft.md`
#
# 或手动添加：
#   `sf push path/to/your/SKILL.md`

skills: []

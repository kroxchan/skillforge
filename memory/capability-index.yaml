# Capability Index — SkillForge 记忆索引
# L0: 能力概要索引（Agent 启动时注入，<500 tokens）
#
# 设计依据（v0.2.7 涌现式）：
#   - 条目不预置，而是在 `sf update-l0` 首次写入某 task_type 时动态创建
#   - 条目代表"你真实做过的工作类型"，不依赖 Registry 预设
#   - task_type 由 Agent 在 Cursor 对话路径自主命名（snake_case）
#   - Registry 空时，本文件只有 `default` + 有真实 count 的条目
#
# 格式：task_type → (count, avg_delta, trend, gap_adjustment)
# 更新来源：Phase 4 评估后由 `sf update-l0` helper 写入（原子写，不手动编辑）
#
# 条目维护规则：
#   - 条目在首次调用 `sf update-l0 --task-type <tt>` 时自动创建
#   - 只有 count > 0 的条目代表真实工作积累
#   - 实在无法分类时用 default（兜底，保证永远存在）

task_type_index:

  default:
    count: 0
    avg_delta: 0.0       # Delta = (rating-3)*20 的 EMA 移动平均（alpha=0.2）
    trend: stable        # stable | improving | degrading（count<5 时不更新）
    gap_adjustment: 0    # 叠加到 Phase 1 原始 Gap 的修正值 = round(avg_delta*2)

  refactoring:
    count: 2
    avg_delta: 0.0
    trend: stable
    gap_adjustment: 0
